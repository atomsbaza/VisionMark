name: CI

on:
  push:
    branches: [ main ]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: CI only needs to read the repo to build & test.
permissions:
  contents: read

jobs:
  build-test:
    name: Build & Test
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: |
          set -o pipefail
          xcodebuild \
            -project VisionMark.xcodeproj \
            -scheme VisionMark \
            -destination 'platform=macOS' \
            -configuration Debug \
            build

      - name: Test
        run: |
          set -o pipefail
          xcodebuild \
            -project VisionMark.xcodeproj \
            -scheme VisionMark \
            -destination 'platform=macOS' \
            -configuration Debug \
            test
